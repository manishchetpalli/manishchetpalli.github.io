site_name: DEwithManish
site_description: Documentation for Data Engineering and Big Data Technologies
site_author: AnalyticsWithManish
site_url: https://manishchetpalli.github.io/

repo_url: https://github.com/manishchetpalli/DataEngineeringNotes
repo_name: "AnalyticsWithManish"
edit_uri: edit/main/docs/


copyright: >
  Copyright &copy; 2026 Manishkumar Chetpalli. 
  This website is maintained for personal learning and documentation purposes.
  Content is inspired by various public resources and original authors.


theme:
  name: material
  logo: assets/images/sqldeveloper-original.svg
  favicon: assets/images/sqldeveloper-original.svg
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - content.code.annotation
    - content.code.copy
    - content.tooltips
    - content.tabs.link
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.instant.preview
    - navigation.tracking
    - navigation.path
    - navigation.expand
    - navigation.sections
    - navigation.instant
    - search.highlight
    - search.suggest
    - search.share
    - navigation.footer  
    - content.action.feedback 
    - toc.follow
    - toc.extend
  palette:
    - scheme: default
      primary: custom
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

